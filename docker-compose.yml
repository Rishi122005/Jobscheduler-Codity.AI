version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job-scheduler-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: job_scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: job-scheduler-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/job_scheduler?schema=public
      - JWT_SECRET=supersecretjwtsigningkey90123
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: job-scheduler-worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/job_scheduler?schema=public
      - BACKEND_API_URL=http://backend:3001
      - WORKER_NAME=docker-worker-node
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: job-scheduler-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
